<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-Bob. Oyravshan-2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ===== Kosmik fon va Yulduzlar uchun tayyorlov ===== */
        body { 
            font-family: 'Arial', sans-serif; 
            background: radial-gradient(circle at center, #0a0e17 0%, #030508 100%);
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh; 
            position: relative;
            overflow-x: hidden;
        }

        /* Dinamik yulduzlar konteyneri */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: blink linear infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px rgba(255,255,255,0.8); }
        }

        /* Kontentlarni yulduzlar ustiga chiqarish */
        #select-screen, #mode-screen, .quiz-box {
            position: relative;
            z-index: 10;
        }

        /* ===== Raqam tanlash ekrani ===== */
        #select-screen {
            width: 100%; max-width: 700px;
            display: flex; flex-direction: column; align-items: center;
            gap: 25px; padding: 20px 0;
        }
        #select-screen h1 {
            font-size: 26px; color: #00ff99; text-align: center;
            text-shadow: 0 0 15px rgba(0,255,153,0.4);
        }
        #select-screen p { color: #999; font-size: 14px; text-align: center; }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 10px;
            width: 100%;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
            background: rgba(17, 17, 17, 0.75);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,255,150,0.15);
            border: 1px solid rgba(0,255,153,0.1);
        }
        .number-grid::-webkit-scrollbar { width: 8px; }
        .number-grid::-webkit-scrollbar-thumb { background: #00ff99; border-radius: 10px; }
        .num-btn {
            background: rgba(27, 27, 27, 0.8);
            border: 2px solid #00ff99;
            color: #00ff99;
            border-radius: 12px;
            padding: 12px 0;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
            text-shadow: 0 0 8px rgba(0,255,153,0.6);
        }
        .num-btn:hover {
            background: #00ff99;
            color: #050505;
            box-shadow: 0 0 20px rgba(0,255,150,0.8);
            transform: scale(1.08);
        }
        .num-btn.picked {
            background: #ff9900;
            border-color: #ff9900;
            color: #050505;
            box-shadow: 0 0 20px rgba(255,153,0,0.8);
        }
        #range-info {
            color: #ff9900; font-size: 15px; font-weight: bold; min-height: 22px;
        }

        /* ===== Funksiya tanlash ekrani (4 karta) ===== */
        #mode-screen {
            display: none;
            width: 100%; max-width: 700px;
            flex-direction: column; align-items: center;
            gap: 25px; padding: 20px 0;
        }
        #mode-screen h1 {
            font-size: 24px; color: #00ff99; text-align: center;
            text-shadow: 0 0 15px rgba(0,255,153,0.4);
        }
        .mode-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .mode-card {
            background: rgba(27, 27, 27, 0.85); border-radius: 20px; padding: 30px 15px;
            text-align: center; transition: 0.4s; color: white; position: relative;
            overflow: hidden; box-shadow: 0 0 20px rgba(0,255,150,0.1); cursor: pointer;
            border: 1px solid rgba(0,255,153,0.1); font-size: 16px; font-weight: bold;
            backdrop-filter: blur(5px);
        }
        .mode-card::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background: linear-gradient(45deg,transparent,#00ff99,transparent);
            top: -150%; left: -150%; transform: rotate(25deg); transition: 0.7s;
        }
        .mode-card:hover::before { top: 100%; left: 100%; }
        .mode-card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 0 35px rgba(0,255,150,0.5); border-color: #00ff99; }
        @media(max-width:600px){ .mode-grid{ grid-template-columns: 1fr; } }

        .btn-show { 
            width: 100%; padding: 15px; background: transparent; border: 2px solid #00ff99; 
            color: #00ff99; border-radius: 15px; cursor: pointer; margin-top: 10px; 
            font-weight: bold; transition: 0.3s; 
        }
        .btn-show:hover { background: #00ff99; color: black; }
        
        .closed-input {
            width: 100%; padding: 15px; margin-top: 10px; border: 2px solid #333;
            border-radius: 12px; font-size: 17px; outline: none; background: #2a2a2a;
            color: white;
        }
        .closed-input:focus { border-color: #00ff99; }
        .btn-check {
            width: 100%; padding: 15px; margin-top: 15px; border: 2px solid #00ff99; border-radius: 15px;
            background: transparent; color: #00ff99; font-weight: bold; cursor: pointer; font-size: 17px;
            transition: 0.3s;
        }
        .btn-check:hover { background: #00ff99; color: black; }
        #closed-result { margin-top: 15px; font-size: 18px; min-height: 30px; text-align: center; }

        /* ===== Intro (countdown) ekrani ===== */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.8s ease;
        }
        .content-box { text-align: center; margin-bottom: 50px; }
        #countdown { 
            position: absolute; bottom: 50px;
            font-size: 80px; color: #00ff99; font-weight: bold;
            text-shadow: 0 0 15px rgba(0,255,153,0.4);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }

        /* ===== Quiz ekrani ===== */
        .quiz-box { 
            display: none;
            width: 100%; max-width: 600px; background: rgba(27, 27, 27, 0.85); padding: 30px; 
            border-radius: 25px; box-shadow: 0 0 35px rgba(0, 255, 150, 0.2); 
            text-align: center; margin-top: 50px; border: 1px solid rgba(0,255,153,0.15);
            backdrop-filter: blur(5px);
        }
        h2 { color: #00ff99; margin-bottom: 20px; font-size: 22px; text-shadow: 0 0 10px rgba(0,255,153,0.2); }
        .option { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: rgba(42, 42, 42, 0.8); border: 2px solid #333; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; text-align: left; color: #fff;
        }
        .option:hover { border-color: #00ff99; background: rgba(50, 50, 50, 0.9); }
        .correct { 
            background: #00ff99 !important; color: black; font-weight: bold; 
            animation: bubbleEffect 0.5s ease-out; box-shadow: 0 0 15px #00ff99;
        }
        @keyframes bubbleEffect {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 153, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 153, 0.5); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 153, 0); }
        }
        .wrong { background: #ff4d4d !important; color: white; box-shadow: 0 0 15px #ff4d4d; }
        .btn-finish { 
            width: 100%; padding: 15px; background: transparent; border: 2px solid #00ff99; 
            color: #00ff99; border-radius: 15px; cursor: pointer; margin-top: 20px; 
            font-weight: bold; transition: 0.3s; 
        }
        .btn-finish:hover { background: #00ff99; color: black; }
    </style>
</head>
<body>

<div id="stars-container"></div>

<div id="select-screen">
    <h1>📚 5-Bob. Oyravshan-2</h1>
    <p>Savollar sonini belgilang:</p>
    <div id="range-info">Boshlang'ich raqamni tanlang</div>
    <div class="number-grid" id="numberGrid"></div>
</div>

<div id="mode-screen">
    <h1>Qaysi funksiyani xohlaysiz?</h1>
    <div class="mode-grid">
        <div class="mode-card" onclick="chooseMode('quiz')">Quiz testlar</div>
        <div class="mode-card" onclick="chooseMode('quiz-aralash')">Quiz aralash</div>
        <div class="mode-card" onclick="chooseMode('yopiq')">Yopiq savol-javob</div>
        <div class="mode-card" onclick="chooseMode('yopiq-aralash')">Yopiq savol-javob aralash</div>
    </div>
</div>

<div id="intro-screen">
    <div class="content-box">
        <h1 style="color:#00ff99; font-size: 32px;">📚 5-Bob. Oyravshan-2</h1>
        <p style="margin: 20px; font-size: 18px; max-width: 600px; line-height: 1.6; color: #ccc;">
            Bilim - kuch, tayyorlaning va omad tilaymiz!
        </p>
    </div>
    <div id="countdown">3</div>
</div>

<div class="quiz-box" id="quiz">
    <h2 id="question">Yuklanmoqda...</h2>
    <div id="options"></div>
    <button class="btn-finish" onclick="finishQuiz()">Testni yakunlash</button>
</div>

<script>
// Yulduzlar effektini dinamik yaratish funksiyasi
function createStars() {
    const container = document.getElementById('stars-container');
    const starCount = 100; // Ekrandagi jami yulduzlar soni

    for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        
        // Tasodifiy o'lcham (1px dan 3px gacha)
        const size = Math.random() * 2 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        
        // Tasodifiy koordinatalar
        star.style.top = `${Math.random() * 100}%`;
        star.style.left = `${Math.random() * 100}%`;
        
        // Tasodifiy miltillash tezligi va kechikishi
        const duration = Math.random() * 3 + 2;
        const delay = Math.random() * 5;
        star.style.animationDuration = `${duration}s`;
        star.style.animationDelay = `${delay}s`;
        
        container.appendChild(star);
    }
}

// Sahifa yuklanganda yulduzlarni yaratish
createStars();

const quizData = [
    {q: `Pashsha o'zi bitta narsa lekin ko'ngilni aynitadi`, options: [`Maqol`, `Hikoya`, `She'r`, `Qo'shiq`], correct: `Maqol`},
    {q: `Kim "Istiqlol" san'at saroyiga borib, har gal eshik tagida bir soatlab turib "Zebo" jurnalining yangi sonlarini tarqatardi`, options: [`Oyravshan`, `Samiya`, `Xosiyatxon`, `Muflixa`], correct: `Oyravshan`},
    {q: `Oyravshanning mashhur bir gapi bor edi: "Eshikdan quvsangiz... Dan tushaman"`, options: [`Teshikdan`, `Derazadan`, `Mo'ridan`, `Tomdan`], correct: `Mo'ridan`},
    {q: `Saroyning xizmat ko'rsatgan "Komandiri" Oyravshanga qanday laqab qo'ygan edi`, options: [`"Shipildoq"`, `"Tirrik"`, `"Chirandoz"`, `"Pashsha"`], correct: `"Shipildoq"`},
    {q: `Komandir har safar Oyravshanni ko'rganda unga qarab nima der edi`, options: [`"Yana keldingmi, shipildoq?"`, `"Ket yo'qol"`, `"Yordam kerakmi?"`, `"Jurnal bormi?"`], correct: `"Yana keldingmi, shipildoq?"`},
    {q: `Konsert tugagach, har safar "Zebo" jurnalidan nechta donasi qolmay sotilib ketardi`, options: [`Yuz-yuz elliktasi`, `Ikki yuztasi`, `Elliktasi`, `Uch yuztasi`], correct: `Yuz-yuz elliktasi`},
    {q: `Oyravshan o'sha sotilgan jurnallardan tushgan pulning hammasini kimning qo'liga olib borib topshirardi`, options: [`Samiya opaning`, `Muflixaning`, `Xosiyatxonning`, `Direktorning`], correct: `Samiya opaning`},
    {q: `Samiya opa pulni olgach, Oyravshanning peshonasidan o'pib nima deb duo qilardi`, options: [`"Baraka top, qizim, sen bo'lmasang bu jurnal allaqachon yopilgan bo'lardi"`, `"Yaxshi ishlabsan"`, `"Rahmat senga"`, `"Yana ko'proq sot"`], correct: `"Baraka top, qizim, sen bo'lmasang bu jurnal allaqachon yopilgan bo'lardi"`},
    {q: `Jurnal redaksiyasida kimning mavqeyi kundan-kunga oshib, tahririyatning "Erkatoyi"ga aylanib borayotgan edi`, options: [`Muflixaning`, `Oyravshanning`, `Xosiyatxonning`, `Dilbarning`], correct: `Muflixaning`},
    {q: `Muflixaning maqolalari asosan qanday mavzularda bo'lar edi`, options: [`Ayollar huquqlari va jamiyatdagi dolzarb muammolar`, <p>`San'atkorlar hayoti`</p>, `Moda va go'zallik`, `Pazandachilik`], correct: `Ayollar huquqlari va jamiyatdagi dolzarb muammolar`},
    {q: `Oyravshanning she'riy turkumlari jurnalning qaysi sahifasida muntazam ravishda bosilib chiqardi`, options: [`"Nafosat" sahifasida`, `"Nazm" sahifasida`, `"Adabiyot" sahifasida`, `"Ijod ko'zgusi"da`], correct: `"Nafosat" sahifasida`},
    {q: `Tahririyatga kelgan yangi kompyuterlarni o'rnatish va jurnal dizaynini yangilash ishini kim o'z bo'yniga oldi`, options: [`Muflixa va uning tanishlari`, `Oyravshanning o'zi`, `Samiya opaning o'g'li`, `Maxsus mutaxassislar`], correct: `Muflixa va uning tanishlari`},
    {q: `Oyravshan o'zining ilk she'riy to'plamini chop ettirish uchun kimdan maslahat va yordam so'radi`, options: [`Samiya opadan`, `Muflixadan`, `Xosiyatxondan`, `Noshirdan`], correct: `Samiya opadan`},
    {q: `Samiya opa kitob chop etish xarajatlarini qoplash uchun kimga homiylik so'rab murojaat qilishni taklif qildi`, options: [`Taniqli tadbirkor va deputatga`, `Madaniyat vazirligiga`, `Hokimiyatga`, `Yozuvchilar uyushmasiga`], correct: `Taniqli tadbirkor va deputatga`},
    {q: `O'sha paytda jurnal tahririyatiga tez-tez kelib turadigan, boy va nufuzli homiy kim edi`, options: [`Shishako'z Deputat`, `Mansurboy`, `Rais bobo`, `Shoikrom`], correct: `Shishako'z Deputat`},
    {q: `Shishako'z Deputat jurnalga homiylik qilish evaziga kimdan o'ziga maxsus maqola yozib berishni talab qildi`, options: [`Muflixadan`, `Oyravshandan`, `Samiya opadan`, `Xosiyatxondan`], correct: `Muflixadan`},
    {q: `Muflixa deputatning bu taklifiga qanday munosabat bildirdi`, options: [`Qat'iyan rad etdi va uning kirdikorlarini fosh qiluvchi maqola yozdi`, `Mamnuniyat bilan qabul qildi`, `Pul evaziga rozi bo'ldi`, `Samiya opaga shikoyat qildi`], correct: `Qat'iyan rad etdi va uning kirdikorlarini fosh qiluvchi maqola yozdi`},
    {q: `Bu voqeadan keyin tahririyatda qanday kelishmovchilik yuzaga keldi`, options: [`Samiya opa jurnalning kelajagidan xavotirga tushib, Muflixani ogohlantirdi`, `Muflixa ishdan ketdi`, `Deputat tahririyatni sotib oldi`, `Oyravshan va Muflixa urishib qolishdi`], correct: `Samiya opa jurnalning kelajagidan xavotirga tushib, Muflixani ogohlantirdi`},
    {q: `Oyravshan kimni yashirincha yaxshi ko'rib yurardi, lekin u buni hech kimga aytolmas edi`, options: [`Tahririyatga kelib-ketadigan yosh jurnalist yigitni`, `Mansurni`, `Shoikromni`, `Hech kimni`], correct: `Tahririyatga kelib-ketadigan yosh jurnalist yigitni`},
    {q: `Jurnalning yubiley sonida bosh sahifaga kimning surati va u haqidagi katta ocherk joylashtirildi`, options: [`Samiya opaning o'zi haqida`, `Oyravshan haqida`, `Muflixa haqida`, `Mashhur bir aktrisa haqida`], correct: `Samiya opaning o'zi haqida`}
];

let activeQuiz = [];
let currentQ = 0, score = 0, answered = 0;
const allAnswers = quizData.map(item => item.correct);

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

let rangeStart = null;
let numButtons = [];

window.onload = function() {
    createStars();
    const grid = document.getElementById('numberGrid');
    for (let i = 1; i <= quizData.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.innerText = i;
        btn.onclick = () => pickNumber(i, btn);
        grid.appendChild(btn);
        numButtons.push(btn);
    }
};

function pickNumber(num, btnEl) {
    const info = document.getElementById('range-info');

    if (rangeStart === null) {
        rangeStart = num;
        btnEl.classList.add('picked');
        info.innerText = `Boshlang'ich: ${num}. Endi oxirgi raqamni tanlang`;
    } else {
        let start = rangeStart;
        let end = num;
        if (end < start) { const t = start; start = end; end = t; }
        btnEl.classList.add('picked');
        info.innerText = `Tanlandi: ${start} - ${end}`;
        setTimeout(() => startWithRange(start, end), 400);
    }
}

function startWithRange(start, end) {
    activeQuiz = quizData.slice(start - 1, end);
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('mode-screen').style.display = 'flex';
}

let quizMode = 'quiz';

function chooseMode(mode) {
    quizMode = mode;
    if (mode === 'quiz-aralash' || mode === 'yopiq-aralash') {
        activeQuiz = shuffle([...activeQuiz]);
    }
    document.getElementById('mode-screen').style.display = 'none';
    document.getElementById('intro-screen').style.display = 'flex';
    startTimer();
}

function startTimer() {
    let count = 3;
    let disp = document.getElementById("countdown");
    disp.innerText = count;
    let timer = setInterval(() => {
        count--;
        if (count > 0) {
            disp.innerText = count;
        } else if (count === 0) {
            disp.innerText = "Boshladik!";
        } else {
            clearInterval(timer);
            document.getElementById("intro-screen").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("intro-screen").style.display = "none";
                document.getElementById("quiz").style.display = "block";
                loadQ();
            }, 800);
        }
    }, 1000);
}

function getOptionsFor(qData) {
    let wrongPool = allAnswers.filter(a => String(a).toLowerCase().trim() !== String(qData.correct).toLowerCase().trim());
    let wrongChoices = shuffle([...new Set(wrongPool)]).slice(0, 3);
    return shuffle([qData.correct, ...wrongChoices]);
}

function loadQ() {
    const qData = activeQuiz[currentQ];
    document.getElementById('question').innerText = `${currentQ + 1}/${activeQuiz.length}. ${qData.q}`;
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';

    if (quizMode === 'yopiq' || quizMode === 'yopiq-aralash') {
        loadClosedQ(qData, optDiv);
    } else {
        loadMultipleChoiceQ(qData, optDiv);
    }
}

function loadMultipleChoiceQ(qData, optDiv) {
    let shuffledOptions = getOptionsFor(qData);

    shuffledOptions.forEach((opt) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        // HTML kontent bo'lsa to'g'ri render qilish uchun
        if(typeof opt === 'object') {
            btn.innerHTML = opt.innerHTML || opt;
        } else {
            btn.innerText = opt;
        }
        btn.onclick = () => check(opt, btn, qData.correct);
        optDiv.appendChild(btn);
    });
}

function loadClosedQ(qData, optDiv) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'closed-input';
    input.id = 'closed-answer';
    input.placeholder = 'Javob yozing...';
    input.onkeypress = (e) => { if (e.key === 'Enter') checkClosed(qData); };

    const checkBtn = document.createElement('button');
    checkBtn.className = 'btn-check';
    checkBtn.innerText = 'Tekshirish';
    checkBtn.onclick = () => checkClosed(qData);

    const resultDiv = document.createElement('div');
    resultDiv.id = 'closed-result';

    optDiv.appendChild(input);
    optDiv.appendChild(checkBtn);
    optDiv.appendChild(resultDiv);

    input.focus();
}

function checkClosed(qData) {
    const inputEl = document.getElementById('closed-answer');
    const resultDiv = document.getElementById('closed-result');
    const user = inputEl.value.toLowerCase().trim();
    
    let targetCorrect = typeof qData.correct === 'object' ? qData.correct.innerText : qData.correct;
    const correct = String(targetCorrect).toLowerCase().trim();

    answered++;
    inputEl.disabled = true;
    document.querySelector('.btn-check').disabled = true;

    if (user === correct || correct.includes(user) && user.length > 3) {
        resultDiv.innerHTML = '<b style="color:#00ff99;">✅ To\'g\'ri</b>';
        score++;
    } else {
        resultDiv.innerHTML = '<b style="color:#ff4444;">❌ Noto\'g\'ri.</b><br> Javob: ' + targetCorrect;
    }

    setTimeout(() => {
        currentQ++;
        if (currentQ < activeQuiz.length) loadQ();
        else finishQuiz();
    }, 2000);
}

function check(selected, element, correct) {
    const options = element.parentElement.querySelectorAll('.option');
    options.forEach(opt => opt.style.pointerEvents = 'none');
    answered++;

    if (selected === correct) {
        element.classList.add('correct');
        score++;
    } else {
        element.classList.add('wrong');
        options.forEach(opt => {
            if (opt.innerText === (typeof correct === 'object' ? correct.innerText : correct)) opt.classList.add('correct');
        });
    }
    setTimeout(() => {
        currentQ++;
        if (currentQ < activeQuiz.length) loadQ();
        else finishQuiz();
    }, 1000);
}

function finishQuiz() {
    let wrong = answered - score;
    document.getElementById('quiz').innerHTML = `
        <h2>Natijalar</h2>
        <div style="line-height: 2.2; font-size: 19px;">
            Jami savollar: <b>${activeQuiz.length} ta</b><br>
            To'g'ri javoblar: <span style="color:#00ff99;">${score} ta</span><br>
            Xato javoblar: <span style="color:#ff4d4d;">${wrong} ta</span>
        </div>
        <button class="btn-finish" onclick="location.reload()">Qaytadan boshlash</button>
    `;
}
</script>
</body>
</html>
