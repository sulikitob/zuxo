<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad A'zam.Til nomusi yopiq savol-javob</title>
<style>
    body { margin:0; padding:0; background:#111; font-family:Arial; color:white; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    #startScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:#111; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; z-index:9999; padding:20px; }
    #startScreen h1 { color:#00ff99; font-size:50px; }
    .oyat { max-width:800px; font-size:28px; line-height:1.8; color:#ddd; margin-top:20px; }
    #startScreen h3 { color:#00ff99; margin-top:20px; }
    #count { font-size:100px; color:#00ff99; margin-top:40px; animation:pulse 1s infinite; }
    @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
    .box { width:650px; background:#1e1e1e; padding:30px; border-radius:20px; text-align:center; box-shadow:0 0 20px black; }
    h2 { color:#00ff99; }
    input { width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; font-size:18px; }
    button { width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; background:#00ff99; color:black; font-weight:bold; cursor:pointer; font-size:18px; }
    #result { margin-top:15px; font-size:20px; }
</style>
</head>
<body>

<div id="startScreen">
    <h1>📚1.Bob.Buzuq til havosi </h1>
    <p class="oyat">“Robbing seni tark etmadi va g‘azab ham qilmadi.<br> Albatta oxirat sen uchun bu dunyodan yaxshidir.”</p>
    <h3>🌙 Zuho surasi 93:3-4</h3>
    <div id="count">3</div>
</div>

<div class="box">
    <h2 id="question"></h2>
    <input type="text" id="answer" placeholder="Javob yozing...">
    <button onclick="check()">Tekshirish</button>
    <button onclick="finishQuiz()" style="background:#ff4444; color:white; margin-top:10px;">Testni tugatish</button>
    <div id="result"></div>
</div>

<script>
    /* COUNTDOWN */
    let time = 3;
    let timer = setInterval(()=>{
        document.getElementById("count").innerText = time;
        time--;
        if(time < 0){
            clearInterval(timer);
            document.getElementById("startScreen").style.display="none";
        }
    },1000);

    /* QUIZ DATA */
const quiz = [
        {question: "Qoramollarda bo'ladigan Bo'ka, So'na, O'qaloq, Qataloqni cho'qqilab yeydigan qush?", correct: "Mayna"},
        {question: "Katta parrandalarning tuxumini, kichkinalarning paloponini yeydigan, qushlar dunyosiga, ekologiya muvozanatiga rahna solgan qush?", correct: "Mayna"},
        {question: "Mamlakatimizga sona, bokalarni yeydi deb keltirilgan mayna qushi sabab hamma yoqni qaysi qush bosdi?", correct: "Qora qarg'a"},
        {question: "Mamlakatimizda mayna va qora qarg'a dastidan qushlar qolmadi, qochishdi, faqat 2 tagina qush qoldi xolos, qaysi qush?", correct: "Musicha chumchuq"},
        {question: "Дуб qaysi daraxt?", correct: "Eman"},
        {question: "сосна qaysi daraxt?", correct: "Qarag'ay"},
        {question: "берёза qaysi daraxt?", correct: "Qayin"},
        {question: "Балут qaysi daraxt?", correct: "Eman"},
        {question: "1859 yilda uyda boqiladigan quyon keltiriladi, Avstraliyadan nechtasi erkinlikka qo'yib yuboriladi?", correct: "24"},
        {question: "1865 yilda bu jonzod ... yetgan va dehqonchilikka katta zarar yetkazgan, zararni cheklash muammo hozir?", correct: "1 mln"},
        {question: "Сазан qaysi baliq?", correct: "Zog'ora baliq"},
        {question: "сазан o'zbekchada yana qanday ataladi?", correct: "Tangabaliq"},
        {question: "беламур qanday baliq?", correct: "Oq amur"},
        {question: "Щука qaysi baliq?", correct: "Cho'rtan"},
        {question: "Толсталоб o'zbekchada?", correct: "Do'ngpeshona"},
        {question: "крахmalni yana qanday atasa bo'ladi?", correct: "Nishasta"},
        {question: "простыня o'zbekchada?", correct: "Xushki"},
        {question: "Спальня o'zbekchada qanday ataladi?", correct: "Xobgoh"},
        {question: "Kurka (induk)ni g'ulg'ul tovuq, g'ulg'ul deb qayerda aytishadi?", correct: "Samarqand"},
        {question: "Kurkani (induk)ni tuyatovuq deb qayerda aytishadi?", correct: "Hammasi to'g'ri"},
        {question: "Kurka va Indukning asl nomi?", correct: "Hammasi"},
        {question: "Kaktus nima deyiladi?", correct: "Kumanjir"},
        {question: "Tropik o'zbekchada qanday ataladi?", correct: "O'rmon"},
        {question: "Tinch okeani o'zbekchada qanday ataladi?", correct: "Baxri muxit kabir"},
        {question: "Atlantik okeani qanday ataladi?", correct: "Baxri muhit otlosi"},
        {question: "Xind okeani qanday ataladi?", correct: "Baxri muhit xindi"},
        {question: "Baxri Xazar qayer?", correct: "Kasbiy dengiz"},
        {question: "Shom qayer?", correct: "Suriya"},
        {question: "Mongoliya asli?", correct: "Mo'g'uliston"},
        {question: "Пулемёт o'zbekchada?", correct: "O'qsochar"},
        {question: "Сахара qayer?", correct: "Sahroyi kabir"},
        {question: "Samovar?", correct: "O'zi qaynar"},
        {question: "Afrikani nima deyishgan?", correct: "Xabashiston"},
        {question: "Germaniya o'zbek tilida?", correct: "Olmoniya"},
        {question: "Болгария o'zbekchada?", correct: "Bulg'oriston"},
        {question: "Vengriya qanday ataladi?", correct: "Mojariston"},
        {question: "Livan o'zbekcha atamasi?", correct: "Lubnon"},
        {question: "Falastinning o'zbekcha nomi?", correct: "Quddus"},
        {question: "Afrikaning xabashistonida cho'l, suvsiz biyobonda, co'l kalamushi, yumronqozig'i, yumronqoziqlarni tutib yeydigan jonivorni korsatuvda Efiopiya shoqoli, xabashiston borisi, shoqol bori deyishgan, aslida chi?", correct: "Do'lta bo'ri"},
        {question: "Bir xujjatli filmda qulo-ci katta, ola-bula yovvoyi it darrandani shoqol deyishgan, aslida nima edi?", correct: "Sirtlon it"},
        {question: "Amerikada yashovchi kayot o'zbekchada nima?", correct: "Chiya bori"}
    ];

    let i = 0;
    let score = 0;

    function load(){
        document.getElementById("result").innerHTML = "";
        document.getElementById("answer").value = "";
        document.getElementById("question").innerText = (i + 1) + "/" + quiz.length + ". " + quiz[i].question;
    }

    function check(){
        let user = document.getElementById("answer").value.toLowerCase().trim();
        let correct = quiz[i].correct.toLowerCase();

        if(user === correct){
            document.getElementById("result").innerHTML = "✅ To'g'ri";
            score++;
        } else {
            document.getElementById("result").innerHTML = "❌ Noto'g'ri. To'g'ri javob: " + quiz[i].correct;
        }

        setTimeout(()=>{
            i++;
            if(i < quiz.length){
                load();
            } else {
                finishQuiz();
            }
        }, 1500);
    }

    function finishQuiz() {
        i = quiz.length;
        document.getElementById("question").innerText = "🎉 Quiz Yakunlandi";
        document.getElementById("answer").style.display = "none";
        
        document.querySelectorAll(".box > button").forEach(b => b.style.display = "none");
        
        document.getElementById("result").innerHTML = `
            <div style="font-size:24px; color:#fff; line-height:2;">
                ✅ To'g'ri: <b style="color:#00ff99;">${score}</b><br>
                ❌ Noto'g'ri: <b style="color:#ff4444;">${quiz.length - score}</b><br>
                Yakuniy natija: <b>${score} / ${quiz.length}</b>
            </div>
            <button onclick="location.reload()" style="background:#00ff99; margin-top:20px;">🔄 Qayta ishlash</button>
        `;
    }

    load();
</script>

</body>
</html>
