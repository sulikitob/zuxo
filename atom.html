<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Galactic Elemental Explosion</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: radial-gradient(circle, #0f0c29, #302b63, #24243e); overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="natureCanvas"></canvas>

<script>
    const canvas = document.getElementById('natureCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    const particleCount = 1500;

    class ElementalParticle {
        constructor() {
            this.init();
        }
        init() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.radius = Math.random() * 2 + 0.5;
            this.angle = Math.random() * Math.PI * 2;
            this.velocity = Math.random() * 8 + 1;
            this.friction = 0.97;
            this.opacity = 1;
            // Tabiiy rang palitrasi: oltin, oq, havo rang
            this.color = Math.random() > 0.5 ? '#FFD700' : '#E0FFFF';
        }
        update() {
            this.x += Math.cos(this.angle) * this.velocity;
            this.y += Math.sin(this.angle) * this.velocity;
            this.velocity *= this.friction;
            this.opacity -= 0.005;
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function init() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new ElementalParticle());
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(15, 12, 41, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        particles.forEach((p, index) => {
            if (p.opacity > 0) {
                p.update();
                p.draw();
            } else {
                particles.splice(index, 1);
            }
        });
        
        if (particles.length > 0) requestAnimationFrame(animate);
    }

    init();
    animate();
</script>
</body>
</html>
