<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad A'zam.Til nomusi yopiq savol-javob</title>
<style>
    body { margin:0; padding:0; background:#111; font-family:Arial; color:white; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    #startScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:#111; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; z-index:9999; padding:20px; }
    #startScreen h1 { color:#00ff99; font-size:50px; }
    .oyat { max-width:800px; font-size:28px; line-height:1.8; color:#ddd; margin-top:20px; }
    #startScreen h3 { color:#00ff99; margin-top:20px; }
    #count { font-size:100px; color:#00ff99; margin-top:40px; animation:pulse 1s infinite; }
    @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
    .box { width:650px; background:#1e1e1e; padding:30px; border-radius:20px; text-align:center; box-shadow:0 0 20px black; }
    h2 { color:#00ff99; }
    input { width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; font-size:18px; }
    button { width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; background:#00ff99; color:black; font-weight:bold; cursor:pointer; font-size:18px; }
    #result { margin-top:15px; font-size:20px; }
</style>
</head>
<body>

<div id="startScreen">
    <h1>📚5-Bob.Qalam Ahlining jon ozig'i til </h1>
    <p class="oyat">“Robbing seni tark etmadi va g‘azab ham qilmadi.<br> Albatta oxirat sen uchun bu dunyodan yaxshidir.”</p>
    <h3>🌙 Zuho surasi 93:3-4</h3>
    <div id="count">3</div>
</div>

<div class="box">
    <h2 id="question"></h2>
    <input type="text" id="answer" placeholder="Javob yozing...">
    <button onclick="check()">Tekshirish</button>
    <button onclick="finishQuiz()" style="background:#ff4444; color:white; margin-top:10px;">Testni tugatish</button>
    <div id="result"></div>
</div>

<script>
    /* COUNTDOWN */
    let time = 3;
    let timer = setInterval(()=>{
        document.getElementById("count").innerText = time;
        time--;
        if(time < 0){
            clearInterval(timer);
            document.getElementById("startScreen").style.display="none";
        }
    },1000);

    /* QUIZ DATA */
const quiz = [
{question: "Ahmad A'zam ona tilini nimaga o'xshatgan?", correct: "Ulkan daraxtga"},
    {question: "Unday gapir, bunday gapirma degan tarbiya qayerdan boshlanadi?", correct: "Oiladan"},
    {question: "Unday gapirma, bunday gapir deyish oiladan boshlanib qayerda kamol topadi?", correct: "Jamiyatda"},
    {question: "Ahmad A'zam qayerning qadim mavzelaridan biri, qadim mahallada turadi?", correct: "Toshkentning"},
    {question: "Tabiat buzilyapti, uni kim buzyapti?", correct: "Bashariyat"},
    {question: "Men yashayotgan qishloqda ... arig'i oqib o'tadi?", correct: "Bulung'ir"},
    {question: "Uyimizning oldginasidan ... arig'i oqib o'tadi, uni suvi oqava aralashgani uchun sal bo'tana ammo qishda ichsa bo'lar edi?", correct: "Qipchoq"},
    {question: "Kechuvdan o'tayotganda ... almashtirib bo'lmaydi?", correct: "Otni"},
    {question: "Цивилизация so'zining o'rniga qanday so'z ishlatsa bo'ladi?", correct: "Tamaddun"},
    {question: "Chet tilidagi atamalarni o'zimizga yaqin tuyulgan chet tilidagi istiloh bilan almashtiramiz, masalan, astronom...?", correct: "Munajjim"},
    {question: "Бугалтерия so'zining o'rniga qanday atamalarni ishlatsak bo'ladi?", correct: "Muxosiba"},
    {question: "Mustaqillik yillarida istilohlarni o'ylamay shunaqa milliylashtirish oqibatida lug'atimizni forsiycha ... bosib ketdi?", correct: "Goh-goh"},
    {question: "O'zimizda qo'nalg'a atamasi turgan joyda nima deb qoldik?", correct: "Tayyorgoh"},
    {question: "Yarmi arabiy, yarmi forsiy bu ... dan aeroportning o'zi yaxshi emasmidi?", correct: "Ijoddan"},
    {question: "Baynalmilal rayon so'zini forscha nimaga almashtirdik?", correct: "Nohiya"},
    {question: "Yaxshiki kimdir baraka topgur nima qilyapsizlar deb qoldi va nohiya to'xtatildi, ammo nimalar qoldi forsiychadan?", correct: "Noma-lar, bayonnoma, dalolatnoma"},
    {question: "Majlis bayonnomasi deymiz, axir nomani o'zi ... ku?", correct: "Bayon"},
    {question: "Tanqidchi, Munaqqid istilohlarini qaysi tildan oldik?", correct: "Arabcha"},
    {question: "Бухгалтерия so'zi turganda arabcha istiloh bo'lsa ham qaysini ishlatganimiz yaxshi?", correct: "Xisob"},
    {question: "Tanqidchi, Munaqqid so'zlarini o'rniga o'zimizda bor turkiy atama qaysi so'zni qo'llasak bo'ladi?", correct: "Sinchi"},
    {question: "Uyg'ur tilida televizor nima deyiladi?", correct: "sinolg'u"},
    {question: "Uyg'ur tilida radio nima deyiladi?", correct: "unolg'u"},
    {question: "Ko'rinishni olib ko'rsatuvchi so'zini 1 so'z bilan ifodalang?", correct: "sinolg'u"},
    {question: "Ohangni olib ko'rsatuvchi so'zining ma'nosi nima?", correct: "unolg'u"},
    {question: "Fan sohalarini shunoslik, ya'ni tilshunoslik so'zlarini ishlatamiz, bu qo'shimcha qaysi tilni qo'shimchasi?", correct: "fors"},
    {question: "Tilshunos emas tilchi deb ishlatsak ham bo'lar edi, bu qo'shimchalar qaysi tilga oid?", correct: "turkiy"},
    {question: "Somon yo'lini o'rnida qaysi so'zni ishlatsak bo'ladi?", correct: "qahqashon"},
    {question: "Katta ayiq yulduz turkumini o'rniga qaysi arabiy istilohni qo'llashimiz mumkin?", correct: "dubbi akbar"},
    {question: "Qutb yulduzi so'zini o'rniga qaysi o'zimizning atamani qo'llash mumkin bo'ladi?", correct: "temir qoziq"},
    {question: "Qutb yulduzini o'zimizda bor yana qanday so'z bilan atasak bo'ladi?", correct: "oltin qoziq"},
    {question: "Kimning lug'atshunoslik faoliyatidagi fidoiyligi va izlanuvchanligiga havas qilsa arziydi?", correct: "Vladimir Dal'"},
    {question: "Devoni lug'oti turk nechchinchi yil bosib chiqarildi?", correct: "1960"},
    {question: "Devoni lug'otu turkni kim nashrga tayyorlab berdi?", correct: "Solih Mutalliboyev"},
    {question: "Buyuk til obidasi Qutadg'u bilig nechchinchi yil bosib chiqarilgan?", correct: "1971"},
    {question: "Buyuk til obidasi Qutadg'u biligni kim tabdil qiladi?", correct: "Qayum Karimov"},
    {question: "Kim Qutadg'u bilig lug'atini ham tuzgan, afsus bu lug'at dunyo yuzini ko'rmagan, taqdiri ham no'malum?", correct: "Qayum Karimov"},
    {question: "Qutadg'u biligni Boqijon To'xliyev, Sa'dulla Ahmad tayyorlagan tabdili bosib chiqarildi, ammo kimning tabdili asl matn bilan yonma-yon edi?", correct: "Qayum Karimov"},
    {question: "Tilimizning xazinayu safinalari bo'lgan qaysi asarlar haligacha nashr etilmagan?", correct: "barcha javoblar to'g'ri"},
    {question: "Infarq degan so'z kirib kelgan, u so'zning o'rnida o'zimizda bor qaysi so'zlarni ishlatishimiz mumkin?", correct: "sitilsin"},
    {question: "Qalam ahlining jon ozig'i nima?", correct: "til"},
    {question: "Ahmad A'zam bilan kim suhbatlashadi?", correct: "O'ktam Mirzayev"},
    {question: "Ahmad A'zam bilan O'ktam Mirzayev qaysi gazetada nechchinchi yilda suhbatlashgan?", correct: "hurriyat 2013 1 may"}
];

    let i = 0;
    let score = 0;

    function load(){
        document.getElementById("result").innerHTML = "";
        document.getElementById("answer").value = "";
        document.getElementById("question").innerText = (i + 1) + "/" + quiz.length + ". " + quiz[i].question;
    }

    function check(){
        let user = document.getElementById("answer").value.toLowerCase().trim();
        let correct = quiz[i].correct.toLowerCase();

        if(user === correct){
            document.getElementById("result").innerHTML = "✅ To'g'ri";
            score++;
        } else {
            document.getElementById("result").innerHTML = "❌ Noto'g'ri. To'g'ri javob: " + quiz[i].correct;
        }

        setTimeout(()=>{
            i++;
            if(i < quiz.length){
                load();
            } else {
                finishQuiz();
            }
        }, 1500);
    }

    function finishQuiz() {
        i = quiz.length;
        document.getElementById("question").innerText = "🎉 Quiz Yakunlandi";
        document.getElementById("answer").style.display = "none";
        
        document.querySelectorAll(".box > button").forEach(b => b.style.display = "none");
        
        document.getElementById("result").innerHTML = `
            <div style="font-size:24px; color:#fff; line-height:2;">
                ✅ To'g'ri: <b style="color:#00ff99;">${score}</b><br>
                ❌ Noto'g'ri: <b style="color:#ff4444;">${quiz.length - score}</b><br>
                Yakuniy natija: <b>${score} / ${quiz.length}</b>
            </div>
            <button onclick="location.reload()" style="background:#00ff99; margin-top:20px;">🔄 Qayta ishlash</button>
        `;
    }

    load();
</script>

</body>
</html>
