    {q: `Qariyb ikki yildirki shu hovlida yashab, cho'zinchoq yuzli, odam zoriga doim o'qrayib qaraydigan ushoqqina kim`, options: [`Badjahl kampir`, `Aslida`, `Zamira`, `Emine`], correct: `Badjahl kampir`},
    {q: `Ilhon ekang o'sha yuzqarolikdan keyin battar ichib olgan bolam. Allaqayerlarda daydib yuradi. Kam keladi buyoqqa. Bo'mshlikka o'tgan sababi Aslida q`, options: [`Jobr Otarchi bilan`, `G'ayrat bilan`, `Jumaniyoz bilan`, `Burxon bilan`], correct: `Jobr Otarchi bilan`},
    {q: `Toshkentga kelsa G'ayrat Qayerlarni ko'rishni qumsaydi`, options: [`Ilhom akalarining xovlisini`, `O'z uyini`, `Jumaniyozning uyini`, `Hokimiyatni`], correct: `Ilhom akalarining xovlisini`},
    {q: `G'ayrat kimga oyi deydi`, options: [`Badjahl kampirga`, `Aslidaga`, `Zamira`, `Emine`], correct: `Badjahl kampirga`},
    {q: `Qayerning Bo'zsuv bo'yidagi ko'rkam o'z davrida hashamatli sanalgan hovliga G'ayrat ko'pkelgan`, options: [`Yunusobod`, `Chorsu`, `Eski shahar`, `Markaz`], correct: `Yunusobod`},
    {q: `Yunusobod Bo'zsuv bo'yidagi ko'rkam o'z davrida hashmatli sanalgan hovli etagidagi alohida xonada kim turar edi`, options: [`Jumaniyoz jiyan`, `G'ayrat`, `Burxon`, `Abdukarim`], correct: `Jumaniyoz jiyan`},
    {q: `Martabador uy egasini kamdan-kam ko'rgan. Ondasonda uchrashib qolganlarida xam negadir doim qovolari shishinqirab yuradigan... yelkasida beso'naqay to'n, ularga xafsalasizgina qarab "xa yigitlar o'qis`, options: [`Boltavoy doyi`, `Jumaniyoz`, `Burxon`, `Abdukarim`], correct: `Boltavoy doyi`},
    {q: `Martabador uy egasi Boltavoy doyi qo'qqisdan vafot etgach bu hovli-xaram kimga qoldi`, options: [`Arzanda jiyan Jumaniyozboyga`, `G'ayratga`, `Burxonga`, `Abdukarimga`], correct: `Arzanda jiyan Jumaniyozboyga`},
    {q: `Jumaniyozboyning chaqqon xotini kim?`, options: [`Emine xonim`, `Zamira`, `Aslida`, `Munira`], correct: `Emine xonim`},
    {q: `Uy ro'zg'or bilan ishi yo'q ko'pincha mamlakat bo'ylab xizmat safarlarida yuradi ta'rif kim haqida`, options: [`Jumaniyoz`, `G'ayrat`, `Burxon`, `Abdukarim`], correct: `Jumaniyoz`},
    {q: `Emine xonim qayerlik edi`, options: [`Qrim`, `Toshkent`, `Buxoro`, `Xorazm`], correct: `Qrim`},
    {q: `Emine G'ayrat bilan Jumadan 2-3 kurs quyi qaysi bo'limda o'qigan`, options: [`Iqtisod`, `Huquq`, `Tarix`, `Adabiyot`], correct: `Iqtisod`},
    {q: `Emine o'qishni tugatishga tugatdi-yu 1 kun ham sohasi bo'yicha ishlamadi, allaqayda sirtdan ta'lim olib binoyidek...bo'lib ishladi kim bo'lib`, options: [`Teatrshunos`, `O'qituvchi`, `Shifokor`, `Tadbirkor`], correct: `Teatrshunos`},
    {q: `Bugun uncha muncha san'at tomoshasining bosh qozisi shu kishim kim?`, options: [`Emine xonim`, `Zamira`, `Aslida`, `Munira`], correct: `Emine xonim`},
    {q: `Jumaniyozning nechta farzandi bor edi`, options: [`2 aka-uka`, `1 o'g'il`, `2 qiz`, `3 bola`], correct: `2 aka-uka`},
    {q: `Jumaniyozning 2 aka ukasi nima o'ynayotgan edi`, options: [`Tennis`, `Futbol`, `Voleybol`, `Basketbol`], correct: `Tennis`},
    {q: `G'ayrat nur ulashgani qo'shni yurtga borib kelib orttirgan jamg'armasiga nima olgan edi`, options: [`Moshina`, `Uy`, `Tilla`, `Seyf`], correct: `Moshina`},
    {q: `G'ayrat qanaqa rusumli moshina olgan edi`, options: [`Volga`, `Neksiya`, `Matiz`, `Jip`], correct: `Volga`},
    {q: `G'ayratni volga moshinasi biram minilmagan o'rab qayerda qo'yilgandi`, options: [`Jiyanini uyida`, `Garajda`, `Ko'chada`, `Mehmonxonada`], correct: `Jiyanini uyida`},
    {q: `Jumaniyoz Qanday maslahat beradi G'ayratga`, options: [`Qochish`, `Ishga borish`, `Hokimiga borish`, `Vorisxon bilan gaplashish`], correct: `Qochish`},
    {q: `Jumaniyoz G'ayratga qayerga qochishni maslahat beradi`, options: [`Tyumenga`, `Toshkentga`, `Rossiyaga`, `Chet elga`], correct: `Tyumenga`},
    {q: `Nega Jumaniyoz Tyumenni maslahat beradi`, options: [`Rossiya bilan shartnoma bo'lganligi uchun`, `Yaqinligi uchun`, `Ish ko'pligi uchun`, `Xavfsizligi uchun`], correct: `Rossiya bilan shartnoma bo'lganligi uchun`},
    {q: `G'ayrat Vorisxonning diydorini bir xam ko'rmasdan qorong'u yerto'lasida nechi oyga yaqin yotib chiqdi`, options: [`4 oy`, `2 oy`, `6 oy`, `1 oy`], correct: `4 oy`},
    {q: `G'ayratga qo'yilgan 1-ayblov nima`, options: [`Shoyimboyevga Pora bergani`, `Elektr uzgani`, `Vorisxon bilan gaplashgani`, `Ishdan qochgani`], correct: `Shoyimboyevga Pora bergani`},
    {q: `G'ayratga qo'yilgan 2-ayblov nima`, options: [`Qarzdor tashkilot korxonalarning ayrimlaridan elektrni uzib, ayrimlaridan uzmagani`, `Pora olgani`, `Hokimni haqorat qilgani`, `Ishga kelmagani`], correct: `Qarzdor tashkilot korxonalarning ayrimlaridan elektrni uzib, ayrimlaridan uzmagani`},
    {q: `Kimni qo'l oyog'idan ko'tarib yerga uraverib ichini to'kib tashlagandek aftoda bir axvolda ekan. yerdan bosh ko'tarmaydi kim`, options: [`Shoyimbayev`, `Jumaniyoz`, `Burxon`, `Vorisxon`], correct: `Shoyimbayev`},
    {q: `Vorisxon boshqa viloyatga ko'tarilib ketdi. Endi ulрующих qonini ichadi. Vorisxon boshqa viloyatga ketganida u bilan birga nima xam ko'rinmaydi`, options: [`Tuya seyf`, `Moshinasi`, `Kotibi`, `Hujjatlari`], correct: `Tuya seyf`},
    {q: `Jumaniyoz G'ayratga qanday maslahat beradi va samara beradi`, options: [`Qaytib ishga tiklash va Tovon puli`, `Qochish`, `Vorisxon bilan gaplashish`, `Hokimga borish`], correct: `Qaytib ishga tiklash va Tovon puli`},
    {q: `Jumaniyoz aytishi bo'yicha G'ayrat shoir bo'lsa taxallusi kim bo'lar edi`, options: [`G'ayrat Lanji`, `G'ayrat Shoir`, `G'ayrat Qalamkash`, `G'ayrat Dono`], correct: `G'ayrat Lanji`},
    {q: `G'ayrat o'sha gaplardan keyin uni ko'rdingmi?`, options: [`Xech shuniyam shunday qib ber`, `Ha`, `Yo'q`, `Bilmayman`], correct: `Xech shuniyam shunday qib ber`}
];

let activeQuiz = [];
let currentQ = 0, score = 0, answered = 0;

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

let rangeStart = null;
let numButtons = [];

window.onload = function() {
    const grid = document.getElementById('numberGrid');
    for (let i = 1; i <= quizData.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.innerText = i;
        btn.onclick = () => pickNumber(i, btn);
        grid.appendChild(btn);
        numButtons.push(btn);
    }
};

function pickNumber(num, btnEl) {
    const info = document.getElementById('range-info');

    if (rangeStart === null) {
        rangeStart = num;
        btnEl.classList.add('picked');
        info.innerText = `Boshlang'ich: ${num}. Endi oxirgi raqamni tanlang`;
    } else {
        let start = rangeStart;
        let end = num;
        if (end < start) { const t = start; start = end; end = t; }
        btnEl.classList.add('picked');
        info.innerText = `Tanlandi: ${start} - ${end}`;
        setTimeout(() => startWithRange(start, end), 400);
    }
}

function startWithRange(start, end) {
    activeQuiz = quizData.slice(start - 1, end);
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('mode-screen').style.display = 'flex';
}

let quizMode = 'quiz';

function chooseMode(mode) {
    quizMode = mode;
    if (mode === 'quiz-aralash' || mode === 'yopiq-aralash') {
        activeQuiz = shuffle([...activeQuiz]);
    }
    document.getElementById('mode-screen').style.display = 'none';
    document.getElementById('intro-screen').style.display = 'flex';
    startTimer();
}

function startTimer() {
    let count = 3;
    let disp = document.getElementById("countdown");
    disp.innerText = count;
    let timer = setInterval(() => {
        count--;
        if (count > 0) {
            disp.innerText = count;
        } else if (count === 0) {
            disp.innerText = "Boshladik!";
        } else {
            clearInterval(timer);
            document.getElementById("intro-screen").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("intro-screen").style.display = "none";
                document.getElementById("quiz").style.display = "block";
                loadQ();
            }, 800);
        }
    }, 1000);
}

function getOptionsFor(qData) {
    return shuffle([...qData.options]);
}

function loadQ() {
    const qData = activeQuiz[currentQ];
    document.getElementById('question').innerText = `${currentQ + 1}/${activeQuiz.length}. ${qData.q}`;
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';

    if (quizMode === 'yopiq' || quizMode === 'yopiq-aralash') {
        loadClosedQ(qData, optDiv);
    } else {
        loadMultipleChoiceQ(qData, optDiv);
    }
}

function loadMultipleChoiceQ(qData, optDiv) {
    let shuffledOptions = getOptionsFor(qData);

    shuffledOptions.forEach((opt) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.innerText = opt;
        btn.onclick = () => check(opt, btn, qData.correct);
        optDiv.appendChild(btn);
    });
}

function loadClosedQ(qData, optDiv) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'closed-input';
    input.id = 'closed-answer';
    input.placeholder = 'Javob yozing...';
    input.onkeypress = (e) => { if (e.key === 'Enter') checkClosed(qData); };

    const checkBtn = document.createElement('button');
    checkBtn.className = 'btn-check';
    checkBtn.innerText = 'Tekshirish';
    checkBtn.onclick = () => checkClosed(qData);

    const resultDiv = document.createElement('div');
    resultDiv.id = 'closed-result';

    optDiv.appendChild(input);
    optDiv.appendChild(checkBtn);
    optDiv.appendChild(resultDiv);

    input.focus();
}

function checkClosed(qData) {
    const inputEl = document.getElementById('closed-answer');
    const resultDiv = document.getElementById('closed-result');
    const user = inputEl.value.toLowerCase().trim();
    const correct = qData.correct.toLowerCase().trim();

    answered++;
    inputEl.disabled = true;
    document.querySelector('.btn-check').disabled = true;

    if (user === correct) {
        resultDiv.innerHTML = '<b style="color:#00ff99;">✅ To\'g\'ri</b>';
        score++;
    } else {
        resultDiv.innerHTML = '<b style="color:#ff4444;">❌ Noto\'g\'ri.</b><br> Javob: ' + qData.correct;
    }

    setTimeout(() => {
        currentQ++;
        if (currentQ < activeQuiz.length) loadQ();
        else finishQuiz();
    }, 2000);
}

function check(selected, element, correct) {
    const options = element.parentElement.querySelectorAll('.option');
    options.forEach(opt => opt.style.pointerEvents = 'none');
    answered++;

    if (selected === correct) {
        element.classList.add('correct');
        score++;
    } else {
        element.classList.add('wrong');
        options.forEach(opt => {
            if (opt.innerText === correct) {
                opt.classList.add('correct');
            }
        });
    }

    setTimeout(() => {
        currentQ++;
        if (currentQ < activeQuiz.length) loadQ();
        else finishQuiz();
    }, 2000);
}

function finishQuiz() {
    document.getElementById('question').innerText = "Test yakunlandi!";
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = `
        <div style="font-size: 20px; margin-bottom: 20px;">
            Natijangiz: <b style="color:#00ff99;">${score}</b> / ${activeQuiz.length}
        </div>
        <button class="btn-finish" onclick="location.reload()">Qayta boshlash</button>
    `;
}
</script>
