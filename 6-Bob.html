<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad A'zam.Til nomusi yopiq savol-javob</title>
<style>
    body { margin:0; padding:0; background:#111; font-family:Arial; color:white; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    #startScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:#111; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; z-index:9999; padding:20px; }
    #startScreen h1 { color:#00ff99; font-size:50px; }
    .oyat { max-width:800px; font-size:28px; line-height:1.8; color:#ddd; margin-top:20px; }
    #startScreen h3 { color:#00ff99; margin-top:20px; }
    #count { font-size:100px; color:#00ff99; margin-top:40px; animation:pulse 1s infinite; }
    @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
    .box { width:650px; background:#1e1e1e; padding:30px; border-radius:20px; text-align:center; box-shadow:0 0 20px black; }
    h2 { color:#00ff99; }
    input { width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; font-size:18px; }
    button { width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; background:#00ff99; color:black; font-weight:bold; cursor:pointer; font-size:18px; }
    #result { margin-top:15px; font-size:20px; }
</style>
</head>
<body>

<div id="startScreen">
    <h1>📚6-Bob.Manaviy Tahdid sharpasi testiga tayyorlaning </h1>
    <p class="oyat">“Robbing seni tark etmadi va g‘azab ham qilmadi.<br> Albatta oxirat sen uchun bu dunyodan yaxshidir.”</p>
    <h3>🌙 Zuho surasi 93:3-4</h3>
    <div id="count">3</div>
</div>

<div class="box">
    <h2 id="question"></h2>
    <input type="text" id="answer" placeholder="Javob yozing...">
    <button onclick="check()">Tekshirish</button>
    <button onclick="finishQuiz()" style="background:#ff4444; color:white; margin-top:10px;">Testni tugatish</button>
    <div id="result"></div>
</div>

<script>
    /* COUNTDOWN */
    let time = 3;
    let timer = setInterval(()=>{
        document.getElementById("count").innerText = time;
        time--;
        if(time < 0){
            clearInterval(timer);
            document.getElementById("startScreen").style.display="none";
        }
    },1000);

const quiz = [
    {question: "Alisher Nazarning aytishicha qachondan beri odamlar orasida kurash boshlandi?", correct: "odamlarning ongli hayoti boshlangan dan beri"},
    {question: "Yaratgan zot ulug' kitobida darj etganidek odamlarni nega qabilalar va xalqlarga ajratib qo'ydi?", correct: "bir biriga do'st tutinishi va bir birlarini tanishi uchun"},
    {question: "Insonlar orasida urushlar to'xtagan bo'lsa-da manaviy va axloqiy urushlar davom etmoqda va ularni oldini olish uchun nima qilishimiz zarur?", correct: "Inson ongida manaviy axloqiy qadriyatlarni shakllantirishdan iborat"},
    {question: "Adabiyot yaratilgandan buyon uning birlamchi vazifasi nima?", correct: "inson qalbini tarbiyalash"},
    {question: "Ahmad A'zam adabiyotni nimaga o'xshatgan?", correct: "oqayotgan daryoga"},
    {question: "Millat nimasi bilan millat?", correct: "tafakkuri bilan"},
    {question: "Millat tafakkuri bilan millat, tafakkur nimasi bilan tafakkur?", correct: "til bilan"},
    {question: "Millat o'zligining qo'rg'oni nima?", correct: "tafakkur"},
    {question: "Bu irkit narsalar cheksiz chegarasiz axborot texnologiyasi nimaning sharofati bilan bizning uyimizda har kun har soat mehmon?", correct: "cheklanmagan erkinlik bilan"},
    {question: "Ma'naviyatga intervensiya nima?", correct: "globallashuv"},
    {question: "Ma'naviy intervensiya nima?", correct: "manaviy aralashuv"},
    {question: "Kelajagini o'ylamagan davlatning nimasi yo'q?", correct: "buguni"},
    {question: "Kelajagini o'ylamagan davlatning buguni yo'q u faqat ... bilan qolib ketadi?", correct: "o'tmish mozorlarini ulug'lash"},
    {question: "Ko'p asrlar tanazzuldan keyin ... yildan ortiq mustamlakada yashaganimiz uchun o'tmish va bugunimiz sharqdan ham, iqtisodiyat va texnologiyada ilgarilab ketgan g'arbdan ham o'zimizni past olamiz?", correct: "100"},
    {question: "Ta'sirning qaysisi yaxshi qaysisi yomon ekanini bilmaymiz qachon bilamiz?", correct: "o'zligimizni bilish va anglash orqali"},
    {question: "Millatning bilik borlig'i bu tafakkur, Tafakkur esa mehr talab nozik .. bilan tiklangan, .. bilan mustahkamlanadi, ... bilan o'sadi?", correct: "til"},
    {question: "Aslida barcha ma'naviy ruhiy badiiy falsafiy ilmiy jamiki boyliklarimiz nima?", correct: "til"},
    {question: "... g'ariblangan xalqning tafakkuri ham o'tmas bo'lib qoladi, ayni tafakkurning mag'zi-mag'zigacha zax yetadi?", correct: "tili"},
    {question: "Mustaqillik ruhiyatimizga ko'nglimizga erkinlik berdi ammo ... siqintilik ancha ijodkorlarimizni kema bortining uyog'iga chiqarib tashladi?", correct: "moddiy"},
    {question: "Xalqning fikrlaydigan qismi ... ayni xalq oldidagi mas'uliyatini har qanday sharoitda ham unutmasligi lozim?", correct: "afkor omma"},
    {question: "Mustaqillik davri adabiyotini men ... va davr nuqtai nazaridan ajrataman?", correct: "vaqt"}
];

    let i = 0;
    let score = 0;

    function load(){
        document.getElementById("result").innerHTML = "";
        document.getElementById("answer").value = "";
        document.getElementById("question").innerText = (i + 1) + "/" + quiz.length + ". " + quiz[i].question;
    }

    function check(){
        let user = document.getElementById("answer").value.toLowerCase().trim();
        let correct = quiz[i].correct.toLowerCase();

        if(user === correct){
            document.getElementById("result").innerHTML = "✅ To'g'ri";
            score++;
        } else {
            document.getElementById("result").innerHTML = "❌ Noto'g'ri. To'g'ri javob: " + quiz[i].correct;
        }

        setTimeout(()=>{
            i++;
            if(i < quiz.length){
                load();
            } else {
                finishQuiz();
            }
        }, 1500);
    }

    function finishQuiz() {
        i = quiz.length;
        document.getElementById("question").innerText = "🎉 Quiz Yakunlandi";
        document.getElementById("answer").style.display = "none";
        
        document.querySelectorAll(".box > button").forEach(b => b.style.display = "none");
        
        document.getElementById("result").innerHTML = `
            <div style="font-size:24px; color:#fff; line-height:2;">
                ✅ To'g'ri: <b style="color:#00ff99;">${score}</b><br>
                ❌ Noto'g'ri: <b style="color:#ff4444;">${quiz.length - score}</b><br>
                Yakuniy natija: <b>${score} / ${quiz.length}</b>
            </div>
            <button onclick="location.reload()" style="background:#00ff99; margin-top:20px;">🔄 Qayta ishlash</button>
        `;
    }

    load();
</script>

</body>
</html>
