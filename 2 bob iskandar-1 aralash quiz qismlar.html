<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-Bob. Iskandar-2</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family: Arial; 
            background-color: #050505; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .hero { 
            width: 100%; max-width: 1000px;
            display: flex; flex-direction: column; 
            align-items: center; text-align: center; gap: 20px;
            margin-bottom: 50px;
        }

        .hero img { 
            width: 220px; height: 300px; object-fit: cover; 
            border-radius: 15px; box-shadow: 0 0 25px rgba(0,255,150,0.3);
        }

        .hero h1 { font-size: 45px; color: #fff; text-shadow: 0 0 15px #00ff99; }

        .wrapper {
            background: #050505;
            width: 100%;
            padding: 50px 20px;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
        }

        /* 3 ta karta uchun grid */
        .menu-grid { 
            max-width: 1100px; 
            margin: auto;
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
        }
        
        .card { 
            background: #1b1b1b; border-radius: 25px; padding: 40px 20px; 
            text-align: center; transition: 0.4s; text-decoration: none; 
            color: white; position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,255,150,0.1); cursor: pointer;
        }

        .card::before { 
            content: ""; position: absolute; width: 200%; height: 200%; 
            background: linear-gradient(45deg,transparent,#00ff99,transparent); 
            top: -150%; left: -150%; transform: rotate(25deg); transition: 0.7s; 
        }

        .card:hover::before { top: 100%; left: 100%; }
        .card:hover { transform: translateY(-12px) scale(1.03); box-shadow: 0 0 35px rgba(0,255,150,0.5); }

        .card h2 { position: relative; z-index: 2; font-size: 20px; }

        .footer { text-align: center; margin-top: 50px; color: #999; }

        /* Mobil qurilmalar uchun moslashuv */
        @media(max-width:850px){ 
            .menu-grid{ grid-template-columns: 1fr; } 
            .hero h1{ font-size: 28px; } 
        }
    </style>
</head>
<body>

    <div class="hero">
        <img src="sayr.jpg" alt="Kitob">
        <h1>📚 2-Bob. Iskandar-2 </h1>
    </div>

    <div class="wrapper">
        <div class="menu-grid">
            <a href="2 Bob.Iskandar-1 1-qism aralash.html" target="_blank" class="card"><h2>1-qism</h2></a>
            <a href="2 bob iskandar-1 aralash quiz 2 qism.html" target="_blank" class="card"><h2>2-qism</h2></a>
            <a href="2 Bob iskandar-1 aralash 3-qism.html" target="_blank" class="card"><h2>3-qism</h2></a>
 
        </div>
    </div>

    <div class="footer">Nazarovs.uz © 2026</div>

</body>
</html>
